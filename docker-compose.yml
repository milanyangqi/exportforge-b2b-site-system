services:
  web:
    build:
      context: .
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    image: exportforge-b2b-site-system:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-change-me}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
    volumes:
      - ./.data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/zh >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
